apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: exporter.diki.gardener.cloud
  labels:
{{ include "labels" . | indent 4 }}
rules:
- apiGroups:
  - diki.gardener.cloud
  resources:
  - compliancescans
  verbs:
  - get
- apiGroups:
  - diki.gardener.cloud
  resources:
  - compliancescans/status
  verbs:
  - get
  - patch
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - create
