apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: diki-scanner
  namespace: {{ include "dikirunnernamespace" . }}
  labels:
{{ include "labels" . | indent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: scanner.diki.gardener.cloud
subjects:
- kind: ServiceAccount
  name: diki-run
  namespace: {{ include "dikirunnernamespace" . }}
