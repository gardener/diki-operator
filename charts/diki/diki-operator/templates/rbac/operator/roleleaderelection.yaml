apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: diki-operator-leader-election
  namespace: {{ include "leaderelectionnamespace" . }}
  labels:
{{ include "labels" . | indent 4 }}
rules:
- apiGroups:
  - ""
  - events.k8s.io
  resources:
  - events
  verbs:
  - create
  - update
  - patch
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - get
  - create
  - update
