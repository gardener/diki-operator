apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: diki-operator
  namespace: {{ include "dikirunnernamespace" . }}
  labels:
{{ include "labels" . | indent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - get
  - list
  - watch
  - create
- apiGroups:
  - batch
  resources:
  - jobs
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
