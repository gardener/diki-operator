apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: diki-operator
  labels:
{{ include "labels" . | indent 4 }}
rules:
- apiGroups:
  - diki.gardener.cloud
  resources:
  - compliancescans
  verbs:
  - create
  - delete
- apiGroups:
  - diki.gardener.cloud
  resources:
  - compliancescans
  - compliancescans/status
  - scheduledcompliancescans
  - scheduledcompliancescans/status
  verbs:
  - get
  - list
  - watch
  - update
  - patch
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - get
- apiGroups:
  - diki.gardener.cloud
  resources:
  - reportoutputs
  verbs:
  - get
  - list
